    <h3>Inspection Schedule</h3>
     <script>
        function checkPassword() {
            // Set your password here!
            const correctPassword = "MySecretPassword123"; 
            
            const userPassword = prompt("Please enter the password to view this sheet:");

            if (userPassword === correctPassword) {
                // Show the sheet if the password is correct
                document.getElementById('protected-content').style.display = 'block';
                document.body.style.paddingTop = '20px'; // Reset padding
            } else {
                alert("Incorrect password. Access denied.");
                window.location.href = "https://google.com"; // Redirect them away
            }
        }

        // Run the password check as soon as the page starts loading
        window.onload = checkPassword;
    </script>
